name: Matrix Rain
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Matrix Rain asset
        run: |
          mkdir -p dist
          cp assets/matrix-rain.svg dist/matrix-rain.svg

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update matrix rain"

      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2 # Corrected spelling
