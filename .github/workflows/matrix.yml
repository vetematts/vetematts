name: Matrix Rain
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the bot to push the heartbeat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keep-alive heartbeat
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date > heartbeat.txt
          git add heartbeat.txt
          git commit -m "Keep-alive heartbeat 🌧️" || echo "No changes to commit"
          git push

      - name: Copy Matrix Rain asset
        run: |
          mkdir -p dist
          cp assets/matrix-rain.svg dist/matrix-rain.svg

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update matrix rain"
